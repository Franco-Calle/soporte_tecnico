; Pool PHP-FPM ajustado para instancia con 1 GB RAM (EC2 t2.micro / t3.micro).
; Modo estatico para memoria predecible; ~40 MB por worker con opcache.

[www]
user = app
group = app

listen = 9000

pm = static
pm.max_children = 5
pm.max_requests = 500

; Estado de salud accesible desde nginx (opcional).
pm.status_path = /fpm-status
ping.path = /fpm-ping

; Log de solicitudes lentas para diagnosticar problemas de rendimiento.
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

catch_workers_output = yes
decorate_workers_output = no
