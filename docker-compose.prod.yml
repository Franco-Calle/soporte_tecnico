# Perfil de produccion para EC2 free tier (1 GB RAM).
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: soporte-tecnico/app:prod
    container_name: st_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - st_net

  nginx:
    image: nginx:1.27-alpine
    container_name: st_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - st_net

  mysql:
    image: mysql:8.4
    container_name: st_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-soporte_tecnico}
      MYSQL_USER: ${DB_USERNAME:-soporte}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    # Sin puerto expuesto al host: MySQL solo se accede desde la red interna.
    volumes:
      - st_mysql_data:/var/lib/mysql
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - st_net

  queue:
    image: soporte-tecnico/app:prod
    container_name: st_queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3 --backoff=10 --sleep=3 --max-time=3600
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - st_net

networks:
  st_net:
    driver: bridge

volumes:
  st_mysql_data:
