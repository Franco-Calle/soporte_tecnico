services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: soporte-tecnico/app:local
    container_name: st_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - st_net

  nginx:
    image: nginx:1.27-alpine
    container_name: st_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - st_net

  mysql:
    image: mysql:8.4
    container_name: st_mysql
    environment:
      MYSQL_DATABASE: soporte_tecnico
      MYSQL_USER: soporte
      MYSQL_PASSWORD: soporte_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - st_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - st_net

  node:
    image: node:20-alpine
    container_name: st_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - st_net

  queue:
    image: soporte-tecnico/app:local
    container_name: st_queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3 --backoff=10 --sleep=3
    depends_on:
      - app
      - mysql
    networks:
      - st_net

networks:
  st_net:
    driver: bridge

volumes:
  st_mysql_data:
